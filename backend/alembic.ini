# Alembic configuration for Daruka Interview Bot
# https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to migration scripts (relative to this file's location = /app)
script_location = alembic

# Migration file naming: YYYYMMDD_<rev>_<slug>.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Prepend /app to sys.path so "from app.xxx import yyy" works inside env.py
prepend_sys_path = .

# Timezone for generated timestamps
timezone = UTC

# NOTE: sqlalchemy.url is intentionally left as a placeholder.
# It is overridden at runtime from the DATABASE_URL environment variable
# inside alembic/env.py — do NOT hardcode credentials here.
sqlalchemy.url = driver://user:pass@localhost/db


# ── Logging ───────────────────────────────────────────────────────────────────
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %%H:%%M:%%S
